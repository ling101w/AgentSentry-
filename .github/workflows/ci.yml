name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  openclaw-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: openclaw-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: openclaw-plugin/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run ci
      - run: npm run sbom
      - uses: actions/upload-artifact@v4
        with:
          name: openclaw-plugin-cyclonedx-sbom
          path: openclaw-plugin/sbom.cdx.json
